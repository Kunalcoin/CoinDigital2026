services:
  django_gunicorn:
    env_file:
      - .env
    volumes:
      - static:/static
      - ./.env:/app/.env:ro
    build:
      context: .
    ports:
      - "8000:8000"
    # Large Merlin / Dolby Atmos (1GB+) packages: give the worker enough RAM or OOM kills mid-zip.
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
  nginx:
    build: ./nginx
    volumes:
      - static:/static
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django_gunicorn

volumes:
  static: