services:
  django_gunicorn:
    env_file:
      - .env
    volumes:
      - static:/static
      - ./.env:/app/.env:ro
    build:
      context: .
    ports:
      - "8000:8000"
  nginx:
    build: ./nginx
    volumes:
      - static:/static
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django_gunicorn

volumes:
  static: