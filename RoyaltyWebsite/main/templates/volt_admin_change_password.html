{% extends 'volt_base.html' %}
{% load static %}
{% block content %}

<div class="row">
  <div class="col-12 mb-4">
    {% if success_message %}
    <div class="alert alert-success" role="alert">
      {{ success_message }}
    </div>

    {% endif %}

    {% if error_message %}
    <div class="alert alert-danger" role="alert">
      {{ error_message }}
    </div>
    {% endif %}
    <div class="card border-0 shadow components-section">
      <div class="card-header card-header-primary">
        <h3 class="card-title">Change Password</h3>
      </div>
      <div class="card-body">
        <form action="/change_password/" method="post">
          {% csrf_token %}
          <!-- Form -->
          <div class="mb-4">
            <label for="email">Your Email</label>
            <div class="input-group">
              <input type="email" class="form-control" placeholder="{{ username}}" id="email" required disabled>
            </div>
          </div>
          <!-- End of Form -->
          <!-- Form -->
          <div class="form-group mb-4">
            <label for="password">Current Password</label>
            <div class="input-group">
              <span class="input-group-text" id="basic-addon2">
                <svg class="icon icon-xs text-gray-600" fill="currentColor" viewBox="0 0 20 20"
                  xmlns="http://www.w3.org/2000/svg">
                  <path fill-rule="evenodd"
                    d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                    clip-rule="evenodd"></path>
                </svg>
              </span>
              <input type="password" placeholder="current password" class="form-control" name='oldpassword'
                id="oldpassword" required>
            </div>
          </div>
          <!-- End of Form -->
          <!-- Form -->
          <div class="form-group mb-4">
            <label for="password">New Password</label>
            <div class="input-group">
              <span class="input-group-text" id="basic-addon2">
                <svg class="icon icon-xs text-gray-600" fill="currentColor" viewBox="0 0 20 20"
                  xmlns="http://www.w3.org/2000/svg">
                  <path fill-rule="evenodd"
                    d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                    clip-rule="evenodd"></path>
                </svg>
              </span>
              <input type="password" placeholder="new password" class="form-control" name="newpassword" id="newpassword"
                required>
            </div>
          </div>
          <!-- End of Form -->
          <!-- Form -->
          <div class="form-group mb-4">
            <label for="confirm_password">Confirm New Password</label>
            <div class="input-group">
              <span class="input-group-text" id="basic-addon2">
                <svg class="icon icon-xs text-gray-600" fill="currentColor" viewBox="0 0 20 20"
                  xmlns="http://www.w3.org/2000/svg">
                  <path fill-rule="evenodd"
                    d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                    clip-rule="evenodd"></path>
                </svg>
              </span>
              <input type="password" placeholder="confirm password" class="form-control" name="newpasswordconfirm"
                id="newpasswordconfirm" required>
            </div>
          </div>
          <!-- End of Form -->
          <div class="d-grid">
            <button type="submit" class="btn btn-gray-800">Change password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
