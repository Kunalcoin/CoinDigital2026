{% load static %}

<!DOCTYPE html>
<html lang="en">

<head> 
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

<title>{{ settings.WEBAPP_NAME }} - Login</title>
<link rel="icon" type="image/x-icon" href="/static/img/{{ settings.LOGO.light }}">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="title" content="{{ settings.WEBAPP_NAME }} - Login">
<meta name="author" content="{{ settings.WEBAPP_NAME }}">
<meta name="description" content="{{ settings.WEBAPP_NAME }} Royalties Site">
<meta name="keywords" content="coin, digital, {{ settings.WEBAPP_NAME }}, {{ settings.WEBAPP_NAME }} login, music, releases, indian music, tracks, royalty, royalties" />

<link type="text/css" href="/static/volt/vendor/sweetalert2/dist/sweetalert2.min.css" rel="stylesheet">
<link type="text/css" href="/static/volt/vendor/notyf/notyf.min.css" rel="stylesheet">
<link type="text/css" href="/static/volt/css/volt.css" rel="stylesheet">

<style>
    body {
        background-image: url("{% static 'img/background-image.jpg' %}");
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center center;
        background-attachment: fixed;
    }
    .sign-in-btn {
        background-color: #FAAC18;
        color: #160602;
        font-size: large;
        font-weight: bold;
    }
    input::placeholder {
        color: #FAAC18 !important;
    }
</style>
</head>

<body>
    <main>

        <!-- Section -->
        <section class="vh-lg-100 mt-5 mt-lg-0 bg-soft d-flex align-items-center">
            <div class="container">
                
                <div class="row justify-content-center form-bg-image">
                    
                    <div class="col-12 d-flex align-items-center justify-content-center">
                        <div class="shadow border-0 rounded border-light p-4 p-lg-5 w-100 fmxw-500">
                            <div class="text-center text-md-center mb-4 mt-md-0">
                                <h1 class="mb-0 h3" style="font-weight: bolder; color:#FAAC18; font-size: 60px;">{{ settings.WEBAPP_NAME }}</h1>
                            </div>
                            <br>
                            <div class="text-center text-md-center mb-4 mt-md-0">
                                <h1 class="mb-0 h3" style="font-weight: bolder; color:#FAAC18; font-size: 40px;">SIGN IN</h1>
                            </div>
                            <form action="{% url 'login_view' %}" method="post" class="mt-4">
                                <!-- Form -->
                                <div class="form-group mb-4" style="color:#FAAC18;">
                                    <label for="email">Your Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text" style="background-color: #160602;" id="basic-addon1">
                                            <svg class="icon icon-xs text-gray-600" fill="#FAAC18" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"></path><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"></path></svg>
                                        </span>
                                        <input type="email" class="form-control" style="background-color: #160602;color: #FAAC18;" placeholder="email" name="username" id="email" autofocus required>
                                    </div>  
                                </div>
                                <!-- End of Form -->
                                <div class="form-group">
                                    <!-- Form -->
                                    <div class="form-group mb-4" style="color:#FAAC18;">
                                        <label for="password">Your Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text" style="background-color: #160602;" id="basic-addon2">
                                                <svg class="icon icon-xs text-gray-600" fill="#FAAC18" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                                            </span>
                                            <input type="password" placeholder="password" class="form-control" style="background-color: #160602;color: #FAAC18;" name="password" id="password" required>
                                        </div>  
                                    </div>
                                    <!-- End of Form -->
                                    <div class="d-flex justify-content-between align-items-top mb-4">
                                        <div class="form-check">
                                        </div>
                                        <div><a href="{% url 'forgot_password' %}" class="small text-right" style="color:#FAAC18">Lost password?</a></div>
                                    </div>
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn sign-in-btn">Sign In</button>
                                </div>
                                {% if success_message %}
                                <div class="alert alert-success" role="alert" style="margin-top:5%">
                                    {{ success_message }}
                                </div>
                                {% endif %}
                        
                                {% if error_message %}
                                  <div class="alert alert-danger" role="alert" style="margin-top:5%">
                                      {{ error_message }}
                                  </div>
                                {% endif %}
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Core -->
<script src="/static/volt/vendor/@popperjs/core/dist/umd/popper.min.js"></script>
<script src="/static/volt/vendor/bootstrap/dist/js/bootstrap.min.js"></script>

<!-- Vendor JS -->
<script src="/static/volt/vendor/onscreen/dist/on-screen.umd.min.js"></script>

<!-- Slider -->
<script src="/static/volt/vendor/nouislider/distribute/nouislider.min.js"></script>

<!-- Smooth scroll -->
<script src="/static/volt/vendor/smooth-scroll/dist/smooth-scroll.polyfills.min.js"></script>

<!-- Charts -->
<script src="/static/volt/vendor/chartist/dist/chartist.min.js"></script>
<script src="/static/volt/vendor/chartist-plugin-tooltips/dist/chartist-plugin-tooltip.min.js"></script>

<!-- Datepicker -->
<script src="/static/volt/vendor/vanillajs-datepicker/dist/js/datepicker.min.js"></script>

<!-- Sweet Alerts 2 -->
<script src="/static/volt/vendor/sweetalert2/dist/sweetalert2.all.min.js"></script>

<!-- Moment JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.27.0/moment.min.js"></script>

<!-- Vanilla JS Datepicker -->
<script src="/static/volt/vendor/vanillajs-datepicker/dist/js/datepicker.min.js"></script>

<!-- Notyf -->
<script src="/static/volt/vendor/notyf/notyf.min.js"></script>

<!-- Simplebar -->
<script src="/static/volt/vendor/simplebar/dist/simplebar.min.js"></script>

<!-- Github buttons -->
<script async defer src="https://buttons.github.io/buttons.js"></script>

<!-- Volt JS -->
<script src="/static/volt/js/volt.js"></script>

    
</body>

</html>
