<script>
    var current_upc_code = null;
    function resetForm($form) {
        $form.find('input:text, input:password, input:file, select, textarea').val('');
    }
    function add_new_label() {
        var new_label = document.getElementById('label_new').value
        if (new_label != '') {
            var select = document.getElementById("labels");
            var found = false;
            for (var i = 0; i < select.options.length; i++) {
                if (select.options[i].value === new_label) {
                    found = true;
                }
            }
            if (found == false) {
                select.options[select.options.length] = new Option(new_label, new_label);
            }
            for (var i = 0; i < select.options.length; i++) {
                if (select.options[i].value === new_label) {
                    select.options[i].selected = true;
                }
            }
        }
        $.ajax({
            url: "/releases/add_new_label/" + new_label + "|_|" + '{{ rl_data.created_by }}',
            type: 'GET'
        }).then(function (response) {
            if (response.error) {
                sendSweetAlert('error', '',"Issue adding label to database!")
            }
        });
        document.getElementById('label_new').value = ''
    }
    function isIsrcFormatCorrect(isrc) {
        return /^[a-zA-Z0-9]{12}$/.test(isrc);
    }
    function submit_releases_form() {
        var upc_field = document.getElementById("upc_code");
        var upc_field_check = document.getElementById("upc_code_check");
        var reference_number = document.getElementById("reference_number");
        var labels = document.getElementById("labels").value;
        var selected_primary_genre = document.getElementById("primary_genere");
        var selected_secondary_genre = document.getElementById("secondary_genere");
        var selected_language = document.getElementById("language").value;
        var cover_art_file = document.getElementById('cover_art_file_name').value;
        var output_cover_art_file_src = document.getElementById('output_cover_art').src;
    
        if ((cover_art_file == '' || cover_art_file == null) && !(output_cover_art_file_src.includes('amazonaws.com'))) {
            sendSweetAlert('basic', '', "Please upload cover art!");
            return;
        }

        if (!upc_field_check.checked && upc_field.value == "") {
            sendSweetAlert('basic', '', "UPC Code is not empty!, either check the box or enter a UPC Code!, Cannot have both!");
            return;
        }
        if (upc_field_check.checked && upc_field.value != "") {
            sendSweetAlert('basic', '', "UPC Code is not empty!, either check the box or enter a UPC Code!, Cannot have both!");
            return;
        }
    
        // Language Validation
        if (selected_language == "No linguistic content") {
            sendSweetAlert('basic', '', "Please select a language!");
            return;
        }
    
        // Artist Role Validation
        const requiredRoles = ['Primary Artist', 'Lyricist', 'Composer', 'Producer'];
        const additionalRoles = [
            "Xylophone", "Whistle", "Vocals", "Violin", "Viola De Gamba", "Viola", "Trumpet",
            "Trombone", "Tambourine", "Synthesizer", "Saxophone", "Recorder", "Rap", "Programming",
            "Piano", "Percussion", "Organ", "Oboe", "Metallophone", "Lute", "Keyboards", "Horn",
            "Harp", "Harmonica", "Guitar", "Flute", "Fiddle", "Ensemble", "Drums", "Clarinet",
            "Choir", "Cello", "Bells"
        ];
        let primaryArtistCount = 0;
        let additionalRolesCount = 0;
    
        // Confirm current_selected_artist_roles is properly populated
        if (!Array.isArray(current_selected_artist_roles) || current_selected_artist_roles.length === 0) {
            sendSweetAlert('error', '', "Artist roles not correctly populated. Please review selected roles.");
            return;
        }
    
        // Check if required roles are included
        if (!requiredRoles.every(role => current_selected_artist_roles.includes(role))) {
            sendSweetAlert('basic', '', "A Release must include each of the following artist roles: Primary Artist, Composer, Lyricist, Producer.");
            return;
        }
    
        // Debugging: Verify role names in the array
        console.log("Selected Artist Roles:", current_selected_artist_roles);
    
        // Count 'Primary Artist' and additional roles
        current_selected_artist_roles.forEach(role => {
            if (role === 'Primary Artist') {
                primaryArtistCount++;
            } else if (additionalRoles.includes(role)) {
                additionalRolesCount++;
            }
        });
    
        // Debugging: Check the counts for primary and additional roles
        console.log("Primary Artist Count:", primaryArtistCount);
        console.log("Additional Roles Count:", additionalRolesCount);
    
        // Check if there are enough additional roles for each primary artist
        if (primaryArtistCount > 0 && additionalRolesCount < primaryArtistCount) {
            const remainingSelections = primaryArtistCount - additionalRolesCount;
            sendSweetAlert('warning', 'Selection Requirement Not Met', `Please select a role for each primary artist`);
            return;
        }
    
        // UPC and Labels Validation
        if (!upc_field.value) {
            upc_field_check.checked = true;
        }
        if (!labels) {
            sendSweetAlert('basic', '', "Labels Field is empty!");
            return;
        }
    
        // Genre Validation
        if (selected_primary_genre.value == "Select genre") {
            sendSweetAlert('basic', '', "Please select Primary Genre!");
            return;
        }
        if (selected_secondary_genre.value == "Select genre") {
            selected_secondary_genre.value = "";
        }
        if (selected_primary_genre.value === selected_secondary_genre.value) {
            sendSweetAlert('basic', '', "Primary and Secondary Genre cannot be the same!");
            return;
        }
    
        // Form submission with AJAX
        let myform = document.getElementById("releases_form");
        let fd = new FormData(myform);
        set_loading("#in_save_release_info_btn", true, 0, "1.5rem", "1.5rem");
        $.ajax({
            url: "/releases/release_info/{{ primary_uuid }}",
            data: fd,
            type: 'POST',
            processData: false,
            contentType: false,
            dataType: 'json'
        }).done(function(response) {
            var msg = (response && response.message) ? response.message : 'Saved.';
            sendSweetAlert('info', '', msg);
            if (response && response.upc_code !== undefined) {
                current_upc_code = response.upc_code;
            }
            if (response && response.success) {
                window.location.href = '/releases/licenses_info/{{ primary_uuid }}';
                return;
            }
            set_loading("#in_save_release_info_btn", false, 0, "1.5rem", "1.5rem");
        }).fail(function(xhr, status, err) {
            set_loading("#in_save_release_info_btn", false, 0, "1.5rem", "1.5rem");
            var msg = 'Request failed. Please try again.';
            if (xhr && xhr.responseJSON && xhr.responseJSON.message) {
                msg = xhr.responseJSON.message;
            } else if (xhr && xhr.responseText && xhr.status !== 500) {
                try {
                    var o = JSON.parse(xhr.responseText);
                    if (o.message) msg = o.message;
                } catch (e) {}
            }
            sendSweetAlert('error', '', msg);
        }).always(function() {
            set_loading("#in_save_release_info_btn", false, 0, "1.5rem", "1.5rem");
        });
    }
    
    
    function submit_licenses_form() {
        license_holder_name = document.getElementById('license_holder_name');
        copyright_recording_name = document.getElementById('copyright_recording_name');
        digital_release_date = document.getElementById('digital_release_date');
        console.log("digital Release date in format :",digital_release_date.value)
        original_release_date = document.getElementById('original_release_date');
        license_type_format_toggle = document.querySelector('input[name="license_type_format_toggle"]:checked');
        if (!license_holder_name.value) {
            sendSweetAlert('basic', '',"License Holder Name is empty!")
            return;
        }
        else if (!license_type_format_toggle) {
            sendSweetAlert('basic', '', "License Type Format is not selected!");
            return;
        }
        else if (!copyright_recording_name.value) { 
            sendSweetAlert('basic', '',"Copyright Text is empty!")
            return;
        }
        else if (!digital_release_date.value) {
            sendSweetAlert('basic', '',"Digital Release Date is empty!")
            return;
        }
        else if (!original_release_date.value) {
            sendSweetAlert('basic', '',"Original Release Date is empty!")
            return;
        }
        // Convert dates from mm/dd/yyyy to dd/mm/yyyy format
        let digital_value = document.getElementById("digital_release_date").value;
        let original_value = document.getElementById("original_release_date").value;
        
        // Parse the dates and reformat
        let [digital_month, digital_day, digital_year] = digital_value.split('/');
        let [original_month, original_day, original_year] = original_value.split('/');
        
        // Create date objects with the reformatted dates
        let digital_date = new Date(`${digital_year}-${digital_month}-${digital_day}`);
        let original_date = new Date(`${original_year}-${original_month}-${original_day}`);
        
        var diff = digital_date - original_date;
        if (diff >= 0) {
            let myform = document.getElementById("licenses_form");
            let fd = new FormData(myform);
            fd.append(name = "upc_code", value = current_upc_code)
            set_loading("#in_save_licenses_info_btn", true, 0, "1.5rem", "1.5rem");
            $.ajax({
                url: "/releases/licenses_info/{{ primary_uuid }}", data: fd, type: 'POST', processData: false, contentType: false
            }).then(function (response) {
                set_loading("#in_save_licenses_info_btn", true, 0, "1.5rem", "1.5rem");
                sendSweetAlert('info', '',response.message);
                if (response.success) {
                    window.location.href = '/releases/tracks_info/{{ primary_uuid }}'
                }
            });
        }
        else {
            sendSweetAlert('basic', '',"Digital Release Date can not be less than Original Release Date!")
        }
    }

        var isrc_code_track = document.getElementById("isrc_code_track");
        var isrc_code_track_check = document.getElementById("isrc_code_track_check");

        if (!current_selected_artist_roles.includes('Primary Artist') ||

        if (!publishing_rights_name.value) {

        // TODO: validate splits submitted in tracks form
        
        let myform = document.getElementById("tracks_form");
        let fd = new FormData(myform);
        fd.append(name = "title_track", value = track_title)
        set_loading("#in_save_single_track_info_btn", true, 0, "1.5rem", "1.5rem");
        $.ajax({
            url: "/releases/tracks_info/{{ primary_uuid }}/track/{{ primary_track_uuid }}", data: fd, type: 'POST', processData: false, contentType: false
        }).then(function (response) {
            set_loading("#in_save_single_track_info_btn", true, 0, "1.5rem", "1.5rem");
            sendSweetAlert('info', '', response.message);
            if (response.success) {
                window.location.href = '/releases/preview_distribute_info/{{ primary_uuid }}'
            }
        });
    }
    function submit_preview_distribute() {
        set_loading("#in_preview_dist_info_btn", true, 0, "1.5rem", "1.5rem");
        $.ajax({
            url: "/releases/preview_distribute_info/{{ primary_uuid }}", type: 'POST',
        }).then(function (response) {
            set_loading("#in_preview_dist_info_btn", false, 0, "1.5rem", "1.5rem");
            if (response.success) {
                if (response.sonosuite) {
                    var s = response.sonosuite;
                    var text = s.message || (s.success ? 'Sent to all stores.' : ('Error: ' + (s.error || 'Unknown')));
                    var el = document.getElementById('sonosuite-results-text');
                    if (el) el.textContent = text;
                    var block = document.getElementById('sonosuite-results-modal');
                    if (block) block.style.display = 'block';
                }
                $('#modal-opener').click();
                // Reload so status shows Pending approval / Approve button
                setTimeout(function() { window.location.reload(); }, 800);
            } else {
                sendSweetAlert('error', '', response.message);
            }
        }).fail(function (xhr) {
            set_loading("#in_preview_dist_info_btn", false, 0, "1.5rem", "1.5rem");
            var msg = (xhr.responseJSON && xhr.responseJSON.message) ? xhr.responseJSON.message : null;
            if (!msg && xhr.responseText) {
                try { var p = JSON.parse(xhr.responseText); if (p && p.message) msg = p.message; } catch (e) {}
            }
            if (!msg && xhr.responseText && xhr.responseText.length < 400) msg = xhr.responseText;
            if (!msg) msg = 'Request failed. HTTP ' + (xhr.status || '0') + (xhr.status === 0 ? ' (check network)' : '');
            sendSweetAlert('error', '', msg);
        });
    }
    function reload_page() {
        window.location.reload();
    }
    function createAndSetSelectOptions(selectId, data, selectedOption) {
        var array = data;
        var selectList = document.getElementById(selectId);
        for (var i = 0; i < array.length; i++) {
            var option = document.createElement("option");
            option.value = array[i];
            option.text = array[i];
            if (String(selectedOption) === String(array[i])) {
                option.selected = true;
            }
            selectList.appendChild(option);
        }
    }
    function generateArrayOfYears(noOfYears) {
        var max = new Date().getFullYear()
        var min = max - noOfYears
        max = max + noOfYears
        var years = []

        for (var i = min; i <= max; i++) {
            years.push(i)
        }
        return years
    }
    function update_release_title() {
        set_loading("#update_release_title_btn", true, 0, "1rem", "1rem");
        new_release_name = document.getElementById("update_release_title_input").value;
        
        // Check if name contains only alphanumeric characters
        const alphanumericRegex =/^[a-zA-Z0-9\s|()#&\-',."\!\?\[\]:\/\+\%\*]+$/;

        
        if (new_release_name.trim() != "") {
            if (!alphanumericRegex.test(new_release_name.trim())) {
                set_loading("#update_release_title_btn", false, 0, "1rem", "1rem");
                sendSweetAlert('basic', '', "Release name can only contain alphanumeric characters and spaces!");
                return;
            }
            
            $.ajax({
                url: "/releases/update_release_title/{{ primary_uuid }}/" + new_release_name,
                type: 'POST',
            }).then(function (response) {
                set_loading("#update_release_title_btn", true, 0, "1rem", "1rem");
                sendSweetAlert('basic', '',response.message)
            });
        }
        else {
            set_loading("#update_release_title_btn", false, 0, "1rem", "1rem");
            sendSweetAlert('basic', '',"Please enter valid release name!");
        }

    }
</script>
